# Delivery-model control catalog (declarative governance).
#
# This is the single source of WHICH invariants the delivery model enforces, their
# human-readable POLICY, and their SEVERITY. The detection logic for each control is a
# named function in scripts/check-delivery-model.py (the `detector` key binds a control
# to its implementation). This mirrors how enterprise governance systems separate the
# control CATALOG from the control MECHANISM (cf. core-docs catalog/controls/controls.yaml).
#
# Design intent (so the checker ages well):
#   * Policy is stated as behaviour ("never publish a container artifact"), not as a
#     tool list. Detectors are the current, swappable implementation of that policy.
#   * Severity drives enforcement: critical/major fail CI; minor is advisory (warn).
#     Tune with --fail-on {critical,major,minor}.
#
# Policy SSOT (architecture is owned by the ADR/RFC; this catalog only enforces it):
#   ADR-0051 - Artifact Promotion, Digest-Pinned Deployment, and Registry Segregation
#   RFC-0020 - Supply-Chain Integrity and Artifact Promotion

version: 1
policy_ssot:
  - ADR-0051
  - RFC-0020

controls:
  - id: DM-001
    title: CI never builds or publishes a container artifact
    policy: >-
      CI ORCHESTRATES the central canonical build and must never build or publish a
      container image itself. The central build executor is the sole publish identity.
      (Detection is keyword-based over run: blocks today; the policy is the invariant
      that outlives any specific build tool.)
    severity: critical
    detector: no_local_artifact_publish
    refs: [ADR-0051]

  - id: DM-002
    title: Exactly one canonical build; no per-environment or per-variant builds
    policy: >-
      A single immutable artifact is built ONCE and promoted unchanged. There must be
      no second build for another environment or build variant (e.g. a docs / no-docs
      image). Build-once is what makes the promoted digest identical everywhere.
    severity: critical
    detector: single_canonical_build
    refs: [ADR-0051]

  - id: DM-003
    title: Only the dev overlay is written; qualified envs are promoted, never pinned here
    policy: >-
      Dev is the first consumer. staging / preprod / prod receive the SAME digest via
      the Promotion Controller and must never be pinned, built, or written by this
      workflow.
    severity: critical
    detector: no_qualified_env_write
    refs: [ADR-0051]

  - id: DM-004
    title: CI assumes only the ci-build orchestrator identity
    policy: >-
      AWS auth uses OIDC to assume the ci-build ORCHESTRATOR role (inputs.ci_build_role_arn).
      Superseded per-env deploy / terraform-apply role ARNs must never be referenced - the
      orchestrator cannot publish images or mutate clusters.
    severity: critical
    detector: orchestrator_role_only
    refs: [ADR-0051]

  - id: DM-005
    title: No docs / build-variant tag is injected into the canonical build
    policy: >-
      The workflow must not pass swagger/docs build-variant flags (e.g. GO_BUILD_TAGS=swagger,
      -tags swagger) to the canonical build. Swagger is never compiled into the promoted image;
      the SAME swagger-less artifact is promoted to every environment. Developer API docs come
      from local `-tags swagger` builds and the central OpenAPI/contract registry, not from the
      deployed service. (Runtime swaggerpolicy.DocsEnabled is defense-in-depth on top of this.)
    severity: critical
    detector: no_docs_build_variant
    refs: [ADR-0051]

  - id: DM-006
    title: Least-privilege permissions
    policy: >-
      Workflow and job permissions are a subset of {contents: read, id-token: write}.
      No write scope beyond id-token (no packages: write, no contents: write).
    severity: major
    detector: least_privilege_permissions
    refs: [ADR-0051]

  - id: DM-007
    title: The canonical artifact is built from main (trunk-based)
    policy: A run step must fail the build when the ref is not main.
    severity: major
    detector: build_from_main_guard
    refs: [ADR-0051]

  - id: DM-008
    title: OIDC credentials are configured (no long-lived keys)
    policy: >-
      An OIDC configure-aws-credentials step must be present and id-token: write must be
      granted, so credentials are short-lived and keyless.
    severity: major
    detector: oidc_configured
    refs: [ADR-0051]

  - id: DM-009
    title: The immutable digest is pinned into GitOps
    policy: >-
      The workflow must pin the built image (by digest/ref) into the GitOps infra repo
      dev overlay. This asserts the pin BEHAVIOUR exists - it does not mandate a specific
      helper-script name.
    severity: major
    detector: gitops_digest_pin_present
    refs: [ADR-0051]

  - id: DM-010
    title: contract_version output is declared
    policy: The reusable workflow exposes a contract_version workflow_call output (versioned public API).
    severity: major
    detector: output_contract_version
    refs: [ADR-0051]

  - id: DM-011
    title: image_digest output is declared
    policy: The reusable workflow exposes the promoted image_digest as a workflow_call output.
    severity: minor
    detector: output_image_digest
    refs: [ADR-0051]

  - id: DM-012
    title: The workflow cites its governing policy SSOT
    policy: >-
      The header references ADR-0051 and RFC-0020 so the implementation and the policy
      SSOT cannot drift apart.
    severity: minor
    detector: cites_policy_ssot
    refs: [ADR-0051, RFC-0020]
