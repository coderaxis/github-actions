# Delivery-model control catalog (declarative policy-as-code).
#
# This is the single source of WHICH invariants the delivery model enforces and their
# metadata: policy, rationale, remediation, severity, scope, ownership, and lifecycle.
# The catalog defines POLICY ONLY - it never describes how detection is implemented.
# Each control's `detector` key binds it to an implementation in
# scripts/check-delivery-model.py, which may evolve (regex -> AST -> CodeQL -> ...)
# WITHOUT any change to this catalog. This mirrors how enterprise governance systems
# separate the control CATALOG from the control MECHANISM.
#
# Control IDs (DM-NNN) are STABLE and permanent. Never rename or recycle an ID: to
# retire a control set its `status` to deprecated/superseded; to change intent, add a
# new ID and supersede the old one.
#
# Schema (validated by the checker; the seed of a shared cross-domain control schema):
#   required per control: id, title, owner, scope, status, severity, policy, rationale,
#                         remediation, detector, refs
#   severity: critical | major | minor      (critical/major fail CI; minor is advisory)
#   status:   active | deprecated | superseded   (only `active` controls are evaluated)
#   scope:    reusable-workflow | caller-workflow | promotion-controller
#
# Policy SSOT (architecture is owned by the ADR/RFC; this catalog only enforces it):
#   ADR-0051 - Artifact Promotion, Digest-Pinned Deployment, and Registry Segregation
#   RFC-0020 - Supply-Chain Integrity and Artifact Promotion

version: 1
domain: delivery-model
policy_ssot:
  - ADR-0051
  - RFC-0020

controls:
  - id: DM-001
    title: CI never builds or publishes a container artifact
    owner: platform-infrastructure
    scope: reusable-workflow
    status: active
    severity: critical
    policy: >-
      CI orchestrates the central canonical build and must never build or publish a
      container image itself. The central build executor is the sole publish identity.
    rationale: >-
      A single publish identity is what preserves provenance, SBOM, and signature
      guarantees; a second builder reintroduces supply-chain drift and unsigned artifacts.
    remediation: >-
      Remove the local image build/publish step. Produce artifacts only by starting the
      canonical build (aws codebuild start-build -> inboxxhq-build).
    detector: no_local_artifact_publish
    refs: [ADR-0051]

  - id: DM-002
    title: Exactly one canonical build; no per-environment or per-variant builds
    owner: architecture-review-board
    scope: reusable-workflow
    status: active
    severity: critical
    policy: >-
      A single immutable artifact is built once and promoted unchanged. There must be no
      second build for another environment or build variant.
    rationale: >-
      Build-once is what makes the promoted digest byte-identical across environments;
      variant or per-env builds reintroduce drift and double the artifact lifecycle.
    remediation: >-
      Collapse to a single canonical build. Differentiate behaviour at runtime/compile-time
      within the one artifact rather than producing a second image.
    detector: single_canonical_build
    refs: [ADR-0051]

  - id: DM-003
    title: Only the dev overlay is written; qualified envs are promoted, never pinned here
    owner: platform-infrastructure
    scope: reusable-workflow
    status: active
    severity: critical
    policy: >-
      Dev is the first consumer. staging / preprod / prod receive the same digest via the
      Promotion Controller and must never be pinned, built, or written by this workflow.
    rationale: >-
      Pinning a qualified env here forks the promotion path and can bypass the health-gated
      promotion that guarantees every env runs the exact verified digest.
    remediation: >-
      Pin only the dev overlay. Let the Promotion Controller advance staging/preprod/prod.
    detector: no_qualified_env_write
    refs: [ADR-0051]

  - id: DM-004
    title: CI assumes only the ci-build orchestrator identity
    owner: security
    scope: reusable-workflow
    status: active
    severity: critical
    policy: >-
      AWS auth uses OIDC to assume the ci-build orchestrator role (inputs.ci_build_role_arn).
      Superseded per-env deploy / terraform-apply role ARNs must never be referenced.
    rationale: >-
      The orchestrator must be unable to publish images or mutate clusters; a deploy or
      terraform role would grant lateral privilege far beyond starting a build.
    remediation: >-
      Assume inputs.ci_build_role_arn (inboxxhq-ci-build). Remove any *deploy* / *terraform-apply*
      role ARN.
    detector: orchestrator_role_only
    refs: [ADR-0051]

  - id: DM-005
    title: No docs / build-variant tag is injected into the canonical build
    owner: architecture-review-board
    scope: reusable-workflow
    status: active
    severity: critical
    policy: >-
      The workflow must not pass swagger/docs build-variant flags (e.g. GO_BUILD_TAGS=swagger,
      -tags swagger) to the canonical build. The same swagger-less artifact is promoted to every
      environment.
    rationale: >-
      Injecting a build tag forks the artifact and can leak API docs into production. Developer
      docs come from local `-tags swagger` builds and the central OpenAPI/contract registry, not
      the deployed service (runtime swaggerpolicy.DocsEnabled is defense-in-depth on top of this).
    remediation: >-
      Do not pass GO_BUILD_TAGS=swagger or -tags swagger to the build. Serve docs from the central
      contract registry / a docs portal instead.
    detector: no_docs_build_variant
    refs: [ADR-0051]

  - id: DM-006
    title: Least-privilege permissions
    owner: security
    scope: reusable-workflow
    status: active
    severity: major
    policy: >-
      Workflow and job permissions are a subset of {contents: read, id-token: write}. No write
      scope beyond id-token (no packages: write, no contents: write).
    rationale: >-
      Least privilege limits blast radius; a write scope could publish artifacts or mutate the repo,
      undermining the single-publish-identity model.
    remediation: >-
      Restrict permissions to 'contents: read' + 'id-token: write' at both workflow and job level.
    detector: least_privilege_permissions
    refs: [ADR-0051]

  - id: DM-007
    title: The canonical artifact is built from main (trunk-based)
    owner: platform-infrastructure
    scope: reusable-workflow
    status: active
    severity: major
    policy: A run step must fail the build when the ref is not main.
    rationale: >-
      A single-main lineage keeps the canonical artifact reproducible and its provenance
      unambiguous.
    remediation: Add or keep a run step that fails the build when GITHUB_REF_NAME != main.
    detector: build_from_main_guard
    refs: [ADR-0051]

  - id: DM-008
    title: OIDC credentials are configured (no long-lived keys)
    owner: security
    scope: reusable-workflow
    status: active
    severity: major
    policy: >-
      An OIDC configure-aws-credentials step must be present and id-token: write must be granted,
      so credentials are short-lived and keyless.
    rationale: Long-lived static cloud keys in CI are a standing credential-theft risk.
    remediation: >-
      Configure aws-actions/configure-aws-credentials and grant id-token write permission.
    detector: oidc_configured
    refs: [ADR-0051]

  - id: DM-009
    title: The immutable digest is pinned into GitOps
    owner: platform-infrastructure
    scope: reusable-workflow
    status: active
    severity: major
    policy: >-
      The workflow must pin the built image (by digest/ref) into the GitOps infra repo dev overlay.
      This asserts the pin behaviour exists; it does not mandate a specific helper-script name.
    rationale: >-
      GitOps is the deployment source of truth; if the digest is not recorded there, Argo has nothing
      to reconcile and the build never deploys.
    remediation: >-
      Ensure a step records the built image (by digest/ref) into the GitOps infra repo dev overlay.
    detector: gitops_digest_pin_present
    refs: [ADR-0051]

  - id: DM-010
    title: contract_version output is declared
    owner: platform-infrastructure
    scope: reusable-workflow
    status: active
    severity: major
    policy: The reusable workflow exposes a contract_version workflow_call output (versioned public API).
    rationale: >-
      ~40 repos consume this workflow as an API; a versioned contract lets breaking changes be
      explicit and asserted by consumers.
    remediation: Declare a contract_version output under on.workflow_call.outputs.
    detector: output_contract_version
    refs: [ADR-0051]

  - id: DM-011
    title: image_digest output is declared
    owner: platform-infrastructure
    scope: reusable-workflow
    status: active
    severity: minor
    policy: The reusable workflow exposes the promoted image_digest as a workflow_call output.
    rationale: Exposing the promoted digest lets callers and auditors capture the exact deployment identity.
    remediation: Declare an image_digest output under on.workflow_call.outputs.
    detector: output_image_digest
    refs: [ADR-0051]

  - id: DM-012
    title: The workflow cites its governing policy SSOT
    owner: architecture-review-board
    scope: reusable-workflow
    status: active
    severity: minor
    policy: The header references ADR-0051 and RFC-0020 so implementation and policy SSOT cannot drift apart.
    rationale: Traceability from implementation to the governing ADR/RFC is what keeps the two in sync over time.
    remediation: Reference ADR-0051 and RFC-0020 in the workflow header.
    detector: cites_policy_ssot
    refs: [ADR-0051, RFC-0020]
